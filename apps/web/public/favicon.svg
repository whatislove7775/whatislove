<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4DA6FF"/>
      <stop offset="55%"  stop-color="#8B6CF8"/>
      <stop offset="100%" stop-color="#FF7B7B"/>
    </linearGradient>
    <radialGradient id="rim" cx="38%" cy="28%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Body — fits entirely within 512×512 viewBox -->
  <ellipse cx="256" cy="256" rx="220" ry="244" fill="url(#g)"/>
  <!-- Rim light -->
  <ellipse cx="256" cy="256" rx="220" ry="244" fill="url(#rim)"/>
  <!-- Left eye -->
  <ellipse cx="168" cy="214" rx="52" ry="38" fill="#0C0F1A" opacity="0.82"/>
  <!-- Right eye -->
  <ellipse cx="344" cy="214" rx="52" ry="38" fill="#0C0F1A" opacity="0.82"/>
  <!-- Mouth -->
  <rect x="196" y="318" width="120" height="36" rx="18" fill="#0C0F1A" opacity="0.75"/>
</svg>
