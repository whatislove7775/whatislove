services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-anonpsy}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  coturn:
    image: coturn/coturn:4.6
    network_mode: host
    restart: unless-stopped
    command:
      - "-n"
      - "--realm=aprosop.ru"
      - "--user=aprosop:aprosopsecretturn"
      - "--lt-cred-mech"
      - "--fingerprint"
      - "--listening-port=3478"
      - "--min-port=49152"
      - "--max-port=65535"
      - "--log-file=stdout"
      - "--no-cli"
      - "--no-loopback-peers"
      - "--no-multicast-peers"
      - "--denied-peer-ip=10.0.0.0-10.255.255.255"
      - "--denied-peer-ip=127.0.0.0-127.255.255.255"
      - "--denied-peer-ip=172.16.0.0-172.31.255.255"
      - "--denied-peer-ip=192.168.0.0-192.168.255.255"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-key-change-in-production-please}
      DEBUG: ${DEBUG:-True}
      USE_POSTGRES: "True"
      DB_NAME: ${DB_NAME:-anonpsy}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-localdev}
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,arch}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
    command: >
      sh -c "/app/.venv/bin/python manage.py makemigrations --noinput &&
             /app/.venv/bin/python manage.py migrate --noinput &&
             /app/.venv/bin/python manage.py collectstatic --noinput &&
             /app/.venv/bin/python manage.py create_admin &&
             /app/.venv/bin/daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - api
      - web
    # Reload nginx every 6h to pick up renewed certificates
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Check for renewal every 12h
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  certbot-conf:
  certbot-www:
