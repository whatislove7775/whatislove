services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-anonpsy}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-key-change-in-production-please}
      DEBUG: ${DEBUG:-True}
      USE_POSTGRES: "True"
      DB_NAME: ${DB_NAME:-anonpsy}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-localdev}
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,arch}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
    command: >
      sh -c "/app/.venv/bin/python manage.py makemigrations --noinput &&
             /app/.venv/bin/python manage.py migrate --noinput &&
             /app/.venv/bin/python manage.py collectstatic --noinput &&
             /app/.venv/bin/python manage.py create_admin &&
             /app/.venv/bin/daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost}
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-ws://155.212.128.231:7880}
    restart: unless-stopped
    depends_on:
      - api

  livekit:
    image: livekit/livekit-server:v1.7
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50200:50000-50200/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - web

  turn:
    image: coturn/coturn:alpine
    network_mode: host
    restart: unless-stopped
    command: >
      -n
      --log-file=stdout
      --lt-cred-mech
      --fingerprint
      --no-tlsv1
      --no-tlsv1_1
      --no-multicast-peers
      --realm=aprosop.ru
      --user=aprosop:anonpsy2024turn
      --external-ip=155.212.128.231
      --listening-port=3478
      --min-port=49152
      --max-port=65535

volumes:
  pgdata:
