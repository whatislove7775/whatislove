upstream api {
    server api:8000;
}

upstream web {
    server web:3000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name aprosop.ru www.aprosop.ru;
    return 301 https://aprosop.ru$request_uri;
}

server {
    listen 443 ssl;
    server_name aprosop.ru www.aprosop.ru;

    ssl_certificate     /etc/letsencrypt/live/aprosop.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aprosop.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    # WebSocket — Django Channels
    location /ws/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Django Admin static
    location /api/static/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
    }

    # Django REST API + Admin
    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Next.js фронтенд
    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
