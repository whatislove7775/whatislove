upstream api {
    server api:8000;
}

upstream web {
    server web:3000;
}

# ── Catch-all HTTP: direct IP access (no SSL) ─────────────────────
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 10M;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /ws/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout    86400;
        proxy_send_timeout    86400;
        proxy_connect_timeout 10;
        proxy_buffering       off;
        tcp_nodelay           on;
    }

    location /api/static/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── HTTP → HTTPS redirect for aprosop.ru ──────────────────────────
server {
    listen 80;
    server_name aprosop.ru www.aprosop.ru;

    # Certbot ACME challenge (must be served over HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://aprosop.ru$request_uri;
    }
}

# ── HTTPS for aprosop.ru ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name aprosop.ru www.aprosop.ru;

    ssl_certificate     /etc/letsencrypt/live/aprosop.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aprosop.ru/privkey.pem;

    # Modern TLS settings (embedded — no dependency on certbot extras)
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10M;

    # WebSocket — Django Channels
    location /ws/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout    86400;
        proxy_send_timeout    86400;
        proxy_connect_timeout 10;
        proxy_buffering       off;
        tcp_nodelay           on;
    }

    # Django Admin static
    location /api/static/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
    }

    # Django REST API + Admin
    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Next.js frontend
    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
